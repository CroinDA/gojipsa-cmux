name: GOJIPSA

options:
  bundleIdPrefix: app.gojipsa
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: app.gojipsa.$(PRODUCT_NAME:rfc1034identifier)
    DEVELOPMENT_TEAM: 3BAL9BR86N
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:

  # ─── GOJIPSA (.app) — bundles both GOJIPSA and GOJIPSACore sources ───
  # (SPM keeps them as separate targets via Package.swift; xcodebuild merges them
  #  into a single .app to avoid embedded-framework codesign edge cases.)
  GOJIPSA:
    type: application
    platform: macOS
    sources:
      - path: Sources/GOJIPSA
      - path: Sources/GOJIPSACore
        excludes:
          - "Resources/lottie/**"
      - path: Sources/GOJIPSACore/Resources
        type: folder
    dependencies:
      - package: Lottie
        product: Lottie
    info:
      path: Info-GOJIPSA.plist
      properties:
        CFBundleName: GOJIPSA
        CFBundleDisplayName: 꼬집사 (GOJIPSA)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "Built at CMUX × AIM Hackathon Seoul 2026"

  # ─── GOJIPSAUITests (XCTest UI tests via XCUIApplication) ───
  GOJIPSAUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/GOJIPSAUITests
    dependencies:
      - target: GOJIPSA
    settings:
      base:
        TEST_TARGET_NAME: GOJIPSA
        PRODUCT_BUNDLE_IDENTIFIER: app.gojipsa.GOJIPSAUITests
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: GOJIPSAUITests

schemes:
  GOJIPSA:
    build:
      targets:
        GOJIPSA: all
    run:
      config: Debug
      executable: GOJIPSA
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - GOJIPSAUITests
      buildImplicitDependencies: true
    archive:
      config: Release
